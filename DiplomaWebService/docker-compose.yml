version: "3.8"
services:
  webservice:
    container_name: webservice
    build:
      context: .
      dockerfile: DiplomaWebService/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - BFFService=http://bffservice:443/api/
    ports:
      - 443:443